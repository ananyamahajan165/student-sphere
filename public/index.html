<!DOCTYPE html>
<html>
<head>
  <title>Student Sphere</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎓 Student Sphere</h1>

  <!-- Add Student -->
  <div class="form">
    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <input type="number" id="age" placeholder="Age">
    <input type="number" id="marks" placeholder="Marks">
    <button onclick="addStudent()">Add Student</button>
  </div>

  <!-- Buttons -->
  <div class="buttons">
    <button onclick="getStudents()">Show Students</button>
    <button onclick="getRanking()">Show Ranking</button>
    <button onclick="getTopper()">Show Topper</button>
  </div>

  <!-- Output -->
  <div id="output"></div>

  <script src="app.js"></script>

</body>
</html>
